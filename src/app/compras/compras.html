<main class="produtos container">

    <div class="text-center mb-5">
        <h2 class="text-primary">Produtos Cadastrados</h2>
        <p class="text-muted">Confira os produtos disponíveis para compra</p>
    </div>

    <!--Aqui terá uma estrutura que listará od produtos no banco de dados-->
    <div class="row justify-content-center">

        <div class="col-md-4">
            <div class="card shadow-sm">

                <div class="card-body text-center">

                    <h4 class="card-title">
                        Chave de Fenda
                    </h4>

                    <p class="card-text">
                        Ferramenta ideal para pequenos reparos e manutenção.
                    </p>

                    <h5 class="text-success mb-3">
                        R$ 50,00
                    </h5>

                    <button class="btn btn-primary" routerLink="/produtos/checkout">
                        Comprar
                    </button>

                </div>

            </div>
        </div>

    </div>

    <!--Esse botão só vai ser exposto de o perfil for o empreendedor-->
    <div class="cadastrar text-center mt-5">
        <button class="btn btn-success" routerLink="/produtos/cadastrarProduto">
            Cadastrar Produto
        </button>
    </div>

</main>
