<form action="" method="get" class="needs-validation" (submit)="validar()">

    <div class="container d-flex justify-content-center align-items-center min-vh-100">

        <div class="card shadow p-4" style="width: 400px;">

            <div class="text-center mb-4">
                <h2 class="fw-bold text-primary">Login</h2>
                <p class="text-muted">Entre para acessar sua conta</p>
            </div>

            <!-- Login -->
            <div class="mb-3">
                <label for="login" class="form-label">Login</label>
                <input
                    type="text"
                    id="login"
                    name="login"
                    class="form-control"
                    placeholder="Digite seu login"
                    [(ngModel)]="login"
                    >
            </div>

            <!-- Senha -->
            <div class="mb-3">
                <label for="senha" class="form-label">Senha</label>
                <input
                    type="password"
                    id="senha"
                    name="senha"
                    class="form-control"
                    placeholder="Digite sua senha"
                    [(ngModel)]="senha"
                    >
            </div>

            <!-- Botões -->
            <div class="d-grid gap-2 mt-3">
                <button type="submit" class="btn btn-primary">
                    Entrar
                </button>

                <button type="reset" class="btn btn-outline-danger">
                    Limpar
                </button>
            </div>

            <!-- Links -->
            <div class="text-center mt-4">
                <a href="#" class="text-decoration-none">
                    Cadastre-se
                </a>
            </div>

            <div class="text-center mt-2">
                <a href="#" class="btn btn-outline-dark w-100">
                    Entrar com Google
                </a>
            </div>

            <!-- Mensagem -->
            <div class="text-center mt-3">
                @if(response.length > 0){
                <b class="text-danger f-5" id="response">
                    {{response}}
                </b>
                }@else {
                <b class="text-sucess f-5" id="response">
                    {{response}}
                </b>
                }

            </div>

        </div>

    </div>

</form>
